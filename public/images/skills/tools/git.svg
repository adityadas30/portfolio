<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Git logo: diamond with branching icon -->
  <!-- Outer diamond -->
  <path d="M50 4 L96 50 L50 96 L4 50 Z" fill="#F05032"/>
  <!-- Branch dot top -->
  <circle cx="50" cy="28" r="7" fill="white"/>
  <!-- Branch dot bottom-left -->
  <circle cx="34" cy="60" r="7" fill="white"/>
  <!-- Branch dot bottom-right -->
  <circle cx="66" cy="60" r="7" fill="white"/>
  <!-- Lines connecting nodes -->
  <line x1="50" y1="35" x2="50" y2="52" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="34" y2="53" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="66" y2="53" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Center node -->
  <circle cx="50" cy="52" r="5" fill="white"/>
</svg>
