<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Server stack icon with REST label -->
  <!-- Top server -->
  <rect x="12" y="14" width="76" height="20" rx="6" fill="#4F46E5"/>
  <circle cx="26" cy="24" r="4" fill="#818CF8"/>
  <circle cx="38" cy="24" r="4" fill="#34D399"/>
  <rect x="50" y="20" width="30" height="8" rx="3" fill="#6366F1" opacity="0.6"/>
  <!-- Mid server -->
  <rect x="12" y="40" width="76" height="20" rx="6" fill="#4F46E5"/>
  <circle cx="26" cy="50" r="4" fill="#818CF8"/>
  <circle cx="38" cy="50" r="4" fill="#FBBF24"/>
  <rect x="50" y="46" width="30" height="8" rx="3" fill="#6366F1" opacity="0.6"/>
  <!-- Bottom server -->
  <rect x="12" y="66" width="76" height="20" rx="6" fill="#4F46E5"/>
  <circle cx="26" cy="76" r="4" fill="#818CF8"/>
  <circle cx="38" cy="76" r="4" fill="#F87171"/>
  <rect x="50" y="72" width="30" height="8" rx="3" fill="#6366F1" opacity="0.6"/>
  <!-- Connection lines on left -->
  <line x1="6" y1="24" x2="12" y2="24" stroke="#818CF8" stroke-width="2"/>
  <line x1="6" y1="50" x2="12" y2="50" stroke="#818CF8" stroke-width="2"/>
  <line x1="6" y1="76" x2="12" y2="76" stroke="#818CF8" stroke-width="2"/>
  <line x1="6" y1="24" x2="6" y2="76" stroke="#818CF8" stroke-width="2"/>
</svg>
