<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Elephant silhouette simplified -->
  <!-- Body -->
  <ellipse cx="46" cy="58" rx="30" ry="26" fill="#336791"/>
  <!-- Head -->
  <ellipse cx="62" cy="34" rx="20" ry="18" fill="#336791"/>
  <!-- Ear -->
  <ellipse cx="78" cy="28" rx="10" ry="13" fill="#336791"/>
  <ellipse cx="78" cy="28" rx="7" ry="10" fill="#5a9fd4"/>
  <!-- Trunk -->
  <path d="M72 44 Q82 50 84 62 Q85 70 80 72" fill="none" stroke="#336791" stroke-width="8" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="66" cy="30" r="3" fill="white"/>
  <circle cx="67" cy="30" r="1.5" fill="#336791"/>
  <!-- Tusk -->
  <path d="M68 46 Q72 52 70 58" fill="none" stroke="#f0e0c0" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="22" y="76" width="10" height="16" rx="4" fill="#336791"/>
  <rect x="36" y="78" width="10" height="14" rx="4" fill="#336791"/>
  <rect x="50" y="78" width="10" height="14" rx="4" fill="#336791"/>
  <rect x="64" y="76" width="10" height="16" rx="4" fill="#336791"/>
</svg>
