  <ellipse cx="24" cy="28" rx="14" ry="5" fill="#6366F1"/>
  <rect x="10" y="28" width="28" height="20" fill="#6366F1"/>
  <ellipse cx="24" cy="48" rx="14" ry="5" fill="#818CF8"/>
  <ellipse cx="24" cy="34" rx="14" ry="5" fill="#818CF8"/>
  <!-- Arrow right -->
  <path d="M42 40 L54 40" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
  <polygon points="52,36 60,40 52,44" fill="#A5B4FC"/>
